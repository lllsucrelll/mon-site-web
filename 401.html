  <div id="timeline-dot-sticky"></div>
  <script>
(function() {
  var dot = document.getElementById('timeline-dot-sticky');
  var section = document.getElementById('timeline-section');
  var originalDot = document.querySelector('.timeline-dot');
  if (!dot || !section || !originalDot) return;
  function getLineX() {
  var line = document.querySelector('.timeline-center');
  if (!line) return window.innerWidth * 0.5;
  var rect = line.getBoundingClientRect();
  return rect.left + rect.width / 2;
}
  function update() {
  var sRect = section.getBoundingClientRect();
  var lineRect = document.querySelector('.timeline-center').getBoundingClientRect();
  var viewportMid = window.innerHeight * 0.45;
  var lineX = lineRect.left + lineRect.width / 2;
  // Calcul de la position verticale clampée entre début et fin de section
  var dotY = viewportMid;
  // Si on est au-dessus de la section → bulle bloquée en haut
  if (sRect.top > viewportMid) {
    dotY = sRect.top;
  }
  // Si on est en-dessous de la section → bulle bloquée en bas
  else if (sRect.bottom < viewportMid) {
    dotY = sRect.bottom;
  }
  dot.style.display = 'block';
  dot.style.top = dotY + 'px';
  dot.style.left = lineX + 'px';
}
  window.addEventListener('scroll', update);
  window.addEventListener('resize', update);
  update();
})();
</script>
